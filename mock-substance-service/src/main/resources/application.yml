spring.application.name: otuva-mock-substance-service

spring.datasource.url: jdbc:postgresql://localhost:5440/otuvamocksubstanceservice
spring.datasource.username: oph
spring.datasource.password: oph
spring.datasource.hikari.maximum-pool-size: 2
spring.datasource.hikari.connection-timeout: 10000
spring.datasource.hikari.max-lifetime: 900000
spring.datasource.type: com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name: org.postgresql.Driver
spring.jpa.generate-ddl: false
spring.jpa.hibernate.ddl-auto: none
spring.jpa.hibernate.naming.implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.properties.hibernate.id.db_structure_naming_strategy: single
spring.jpa.properties.hibernate.id.new_generator_mappings: true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation: true
spring.jpa.properties.hibernate.integration.envers.enabled: true
spring.jpa.properties.org.hibernate.envers.store_data_at_delete: true

spring.session.jdbc.table-name: spring_session

spring.flyway.enabled: true
spring.flyway.locations: classpath:db/migration
# spring.flyway.table: schema_table_omss
#spring.flyway.validate-on-migrate: true
spring.flyway.baseline-on-migrate: true
spring.flyway.baseline-version: 20260327000000000

spring.main.banner-mode: "off"
spring.mandatory-file-encoding: UTF-8
spring.profiles.active: default
# spring.jackson.serialization.write-dates-as-timestamps: true

server.servlet.context-path: /mock-substance-service
server.servlet.session.cookie.name: JSESSIONID
server.port: 8180
spring.web.error.include-stacktrace: NEVER

cas.service: http://localhost:8081/mock-substance-service
cas.send-renew: false
cas.key: otuva-mock-substance-service
cas.mfa.username: cas
cas.mfa.password: mfa
cas.mfa.encryption-key: changethis
cas.mfa.signing-key: changethis

mock-substance-service.cas-oppija.server-url: http://localhost:8081/cas-oppija
mock-substance-service.cas-oppija.service-base-url: http://localhost:8180/mock-substance-service
