<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <title th:text="#{screen.logout.header}">CAS Logout</title>
    <link href="../../static/css/cas.css" rel="stylesheet" th:remove="tag" />
</head>

<body>
<main layout:fragment="content" role="main" class="container-fluid taustakuva">
    <div class="row text-center">
        <h2 class="page-header w-100 mt-4" th:if="${enableProceed}" th:text="#{logout.proceeding.header}">Uloskirjautuminen käynnissä...</h2>
        <h2 class="page-header w-100 mt-4" th:unless="${enableProceed}" th:text="#{logout.success.header}">Uloskirjautuminen onnistui!</h2>
        <div id="logoutBody" class="card mx-auto login-kortti">
            <div class="card-body">
                <div th:remove="tag" th:if="${enableProceed}">
                    <p th:utext="#{logout.proceeding.content}">Logout will continue in a few seconds. Please wait...</p>
                    <form method="post" id="logoutform" th:action="@{/logout}">
                        <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                        <input type="hidden" name="_eventId" value="proceed"/>
                    </form>
                    <script type="text/javascript">
                        setTimeout((() => $("#logoutform").submit()), 500);
                    </script>
                </div>
                <div th:remove="tag" th:unless="${enableProceed}">
                    <p th:utext="#{logout.success.content}">Jos haluat kirjautua uudestaan, valitse palvelu alta:</p>
                    <ul>
                        <li><a th:text="#{logout.success.virkailijanopintopolku}" href="/">Virkailijan Opintopolku</a></li>
                        <li><a th:text="#{logout.success.arvo}" th:href="${cas.custom.properties.arvo}">Arvo</a></li>
                        <li><a th:text="#{logout.success.oiva}" th:href="${cas.custom.properties.oiva}">Oiva</a></li>
                        <li><a th:text="#{logout.success.valssi}" th:href="${cas.custom.properties.valssi}">Valssi</a></li>
                    </ul>

                    <script th:inline="javascript">
                        clearLocalStorage();
                        clearSessionStorage();
                    </script>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
