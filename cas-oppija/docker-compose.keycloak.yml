services:
  keycloak-postgres:
    container_name: cas-oppija-keycloak-postgres
    image: postgres:16.4
    ports:
      - "5082:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
#    networks:
#      keycloak: {}

  keycloak:
    container_name: cas-oppija-keycloak
    image: quay.io/keycloak/keycloak:26.5.4
    command: ["start-dev", "--import-realm"]
    ports:
      - "8083:8080"
    expose:
      - "8083"
    environment:
      # IMPORT_DIR: "/opt/keycloak/import"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "http://localhost:8083"
      KC_DB: postgres
      KC_DB_URL_HOST: host.docker.internal
      KC_DB_URL_PORT: 5082
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: true
#    volumes:
#      - ./keycloak/import:/opt/keycloak/import
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    depends_on:
      - keycloak-postgres
#    networks:
#      keycloak: {}

#networks:
#  keycloak: {}
#  default: {}