services:
  postgres:
    container_name: cas-oppija-postgres
    image: postgres:16.4
    ports:
      - 5081:5432
    environment:
      POSTGRES_DB: casoppija
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d casoppija" ]
      interval: 10s
      timeout: 5s
      retries: 5